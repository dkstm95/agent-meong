name: Verify

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Run adapter tests, core checks, and app build
        run: bash scripts/check
